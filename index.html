<header>
  <div class="hbrand">MAÉE</div>
  <div class="htitle">お渡し記録</div>
  <div class="tabs">
    <button class="tbtn active" onclick="showTab('new',this)">＋ 新規</button>

<div class="page active" id="page-new">

    <div class="mcard" onclick="selMode('group')"><span class="micon">🔀</span><div><div class="mtitle">複数</div><div class="msub">複数人に渡す（誰に何かは不明）</div></div><span class="marr">›</span></div>
    <div class="mcard" onclick="selMode('bulk')"><span class="micon">📦</span><div><div class="mtitle">集団</div><div class="msub">編集部・施設などまとめて渡す</div></div><span class="marr">›</span></div>

  <!-- SCAN -->
  <div id="v-scan" style="display:none">
    <button class="btng backbtn" onclick="sv('mode')">← 戻る</button>
    <div class="modetitle" id="scan-title"></div>
    <div class="kbox">
      <div class="klbl">OPENAI API KEY</div>
      <div class="krow">
        <input type="password" id="key-input" placeholder="sk-..." oninput="updKey()">
        <button class="ksave" onclick="saveKey()">保存</button>

      <div class="kst" id="kst"></div>

    <button class="scanbtn" id="scanbtn" onclick="trigFile()">📷 写真を選ぶ（複数可）</button>
    <input type="file" id="finput" accept="image/*" multiple style="display:none" onchange="handleFiles(this)">
    <div id="scan-err" class="errbox" style="display:none"></div>
  </div>
  <!-- CONFIRM -->

    <button class="btng backbtn" onclick="sv('scan')">← 撮り直す</button>
    <div class="modetitle" id="conf-title"></div>
    <div class="slabel">📋 認識した商品</div>
    <div class="rbox" id="rlist"></div>
    <div class="slabel" id="rlbl">👤 お名前</div>
    <div id="r-one"><input type="text" id="name-one" placeholder="例：田中 花子"></div>
    <div id="r-group" style="display:none">
      <div id="plist"></div>
      <button class="btng padd" onclick="addP()">＋ 人を追加</button>
    </div>
    <div id="r-bulk" style="display:none"><input type="text" id="name-bulk" placeholder="例：○○編集部、△△クリニック"></div>
    <div class="slabel">📅 日付</div>
    <input type="date" id="dateinput">
    <div class="slabel">📝 メモ（任意）</div>
    <textarea id="notesinput" rows="2" placeholder="備考など..."></textarea>
    <div id="conf-err" class="errbox" style="display:none"></div>
    <button class="btnp" onclick="saveRec()">記録を保存 →</button>
  </div>
  <!-- DONE -->
  <div id="v-done" style="display:none">
    <div class="donew">
      <div class="doneico">✅</div>
      <div class="donetitle">記録しました</div>

      <button class="btnp" onclick="resetNew()">続けて登録</button>
    </div>
  </div>
</div>

<div class="hpage" id="page-history"></div>

<div class="page" id="page-products">

  <div class="rbox" id="plist-all"></div>

  {code:"",    type:"コットンリブ",color:"DBD", colorLabel:"ディープボルドー",hex:"#5c1a2a"},
  {code:"",    type:"コットンリブ",color:"NBR", colorLabel:"ナチュラルブラウン",hex:"#8b6355"},

  {code:"",    type:"コットンシアー",color:"PMK",colorLabel:"プリュムモカ",  hex:"#8b7355"},
  {code:"",    type:"コットンシアー",color:"FBK",colorLabel:"フェザーブラック",hex:"#2a2a2a"},
  {code:"",    type:"コットンシアー",color:"DGY",colorLabel:"ダブグレー",    hex:"#888888"},
  {code:"",    type:"コットンシアー",color:"SW", colorLabel:"スワンホワイト", hex:"#f0ede5"},
  {code:"",    type:"コットンシアー",color:"CLB",colorLabel:"セレストブルー", hex:"#a0c4d8"},

  {code:"1046",type:"シアー",      color:"BG",  colorLabel:"ベージュ",       hex:"#c8b09a"},

  {code:"1044",type:"シアー",      color:"CH",  colorLabel:"チョコレート",   hex:"#4a2c1a"},
  {code:"1045",type:"シアー",      color:"WH",  colorLabel:"ホワイト",       hex:"#d8d8d0"},
  {code:"",    type:"シアー",      color:"NBG", colorLabel:"ナチュラルベージュ",hex:"#c8a882"},

  {code:"1067",type:"グリッターリブ",color:"GD", colorLabel:"ゴールド",      hex:"#c9a84c"},
  {code:"",    type:"グリッターリブ",color:"SV", colorLabel:"シルバー",      hex:"#aaaaaa"},
  // ラインタイプ
  {code:"",    type:"ライン",      color:"CHRD",colorLabel:"チャコール×レッド",hex:"#555555"},
  {code:"",    type:"ライン",      color:"NVSV",colorLabel:"ネイビー×シルバーラメ",hex:"#1a2a4a"},
  // プレミアムウール
  {code:"",    type:"プレミアムウール",color:"OML",colorLabel:"オートミール", hex:"#d4c8b0"},
  {code:"",    type:"プレミアムウール",color:"FGR",colorLabel:"フォレストグリーン",hex:"#2a5a3a"},
  {code:"",    type:"プレミアムウール",color:"FCH",colorLabel:"フォギーチャコール",hex:"#4a4a4a"},
  // ソックス（旧品番）
  {code:"1064",type:"ソックス",    color:"BK",  colorLabel:"ブラック",       hex:"#2a2a2a"},
  {code:"1035",type:"ソックス",    color:"GY",  colorLabel:"グレー",         hex:"#888888"},

let curMode=null, scanned=[], records=JSON.parse(localStorage.getItem("maee-records")||"[]");
let apiKey=localStorage.getItem("maee-gemini-key")||"", pcount=1, hfilter="";

window.onload=()=>{
  if(apiKey){document.getElementById("key-input").value=apiKey;updKey();}
  document.getElementById("dateinput").value=new Date().toISOString().slice(0,10);
  renderProds();updHistTab();
};

function updKey(){
  const v=document.getElementById("key-input").value.trim();
  const el=document.getElementById("kst");
  if(v){el.className="kst ok";el.textContent="✅ キー入力済み";}
  else{el.className="kst warn";el.textContent="⚠ platform.openai.com でキーを確認";}
}
function saveKey(){
  const v=document.getElementById("key-input").value.trim();
  if(!v)return;
  apiKey=v;localStorage.setItem("maee-gemini-key",v);updKey();
  alert("APIキーを保存しました！次回から自動で読み込まれます。");
}

function showTab(t,btn){
  document.querySelectorAll(".page,.hpage").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tbtn").forEach(el=>el.classList.remove("active"));
  if(t==="history"){document.getElementById("page-history").classList.add("active");renderHist();}
  else document.getElementById("page-"+t).classList.add("active");
  btn.classList.add("active");
}

function sv(v){["mode","scan","confirm","done"].forEach(n=>document.getElementById("v-"+n).style.display=n===v?"block":"none");}
function selMode(m){
  curMode=m;
  const t={one:"🎁 個別",group:"🔀 複数",bulk:"📦 集団"};
  document.getElementById("scan-title").textContent=t[m];
  document.getElementById("conf-title").textContent=t[m];
  sv("scan");
}
function resetNew(){
  curMode=null;scanned=[];pcount=1;
  ["name-one","name-bulk","notesinput"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("dateinput").value=new Date().toISOString().slice(0,10);
  document.getElementById("scan-err").style.display="none";
  document.getElementById("conf-err").style.display="none";
  document.getElementById("finput").value="";
  sv("mode");
}

function trigFile(){document.getElementById("finput").click();}

async function handleFiles(inp){
  const files=Array.from(inp.files||[]);
  if(!files.length)return;
  const key=document.getElementById("key-input").value.trim()||apiKey;
  if(!key){showErr("scan","Gemini APIキーを入力・保存してください");return;}
  const btn=document.getElementById("scanbtn");
  btn.disabled=true;document.getElementById("scan-err").style.display="none";
  const all=[];
  for(let i=0;i<files.length;i++){
    btn.textContent=(i+1)+"/"+files.length+"枚目 認識中...";
    try{
      const b64=await resize(files[i]);
      const items=await gemini(b64,key);
      all.push(...items);
    }catch(e){
      btn.textContent="📷 写真を選ぶ（複数可）";btn.disabled=false;inp.value="";
      showErr("scan",e.message);return;
    }
  }
  btn.textContent="📷 写真を選ぶ（複数可）";btn.disabled=false;inp.value="";
  if(!all.length){showErr("scan","商品を認識できませんでした。ラベルがはっきり写った写真を使ってください。");return;}
  const counted=[];
  all.forEach(r=>{
    const ex=counted.find(x=>x.code===r.code&&x.colorLabel===r.colorLabel);
    if(ex)ex.qty+=(r.qty||1);
    else counted.push({...r,qty:r.qty||1});
  });
  scanned=counted;
  renderConf();sv("confirm");
}

function resize(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error("ファイル読み込み失敗"));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>res(e.target.result.split(",")[1]);
      img.onload=()=>{
        const MAX=1200;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        res(c.toDataURL("image/jpeg",0.82).split(",")[1]);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function gemini(b64,key){
  const list=PRODUCTS.map(p=>"品番"+(p.code||"不明")+": "+p.type+" "+p.colorLabel+(p.code?"":"（品番なし）")).join("\n");
  const prompt="MAEÉコンプレッションソックスのパッケージ画像です。ラベルの品番・商品名・色を読み取り、下記リストと照合してください。\n\n商品リスト:\n"+list+"\n\n必ずJSON配列のみを返してください。説明文不要。\n[{\"code\":\"品番(不明なら空)\",\"type\":\"種類\",\"color\":\"カラーコード\",\"colorLabel\":\"色名\",\"qty\":個数}]\n同じ商品が複数写っていれば qty を増やす。認識できなければ [] のみ。";
  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({
      model:"gpt-4o-mini",
      max_tokens:1000,
      messages:[{role:"user",content:[
        {type:"image_url",image_url:{url:"data:image/jpeg;base64,"+b64}},
        {type:"text",text:prompt}
      ]}]
    })
  });
  const raw=await r.text();
  if(!r.ok)throw new Error("API "+r.status+": "+raw.slice(0,150));
  const data=JSON.parse(raw);
  if(data.error)throw new Error(data.error.message||"APIエラー");
  const text=data?.choices?.[0]?.message?.content?.trim()||"";
  const pats=[/```json\s*([\s\S]*?)```/,/```\s*([\s\S]*?)```/,/(\[[\s\S]*\])/];
  for(const p of pats){const m=text.match(p);if(m){try{const v=JSON.parse(m[1]||m[0]);if(Array.isArray(v))return v;}catch(e){}}}
  try{const v=JSON.parse(text);if(Array.isArray(v))return v;}catch(e){}
  throw new Error("解析失敗: "+text.slice(0,100));
}
